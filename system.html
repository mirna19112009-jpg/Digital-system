<!DOCTYPE html>
<html>
<head>
    <title>Digital Student System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="system.html">System</a>
</nav>

<div class="container">
    <h1>Student Management System</h1>

    <div class="card">
        <input type="text" id="name" placeholder="Student Name">
        <input type="number" id="id" placeholder="Student ID">
        <input type="number" id="grade" placeholder="Student Grade">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="card">
        <button onclick="showStudents()">View Students</button>
        <button onclick="calculateAverage()">Calculate Average</button>
        <p id="output"></p>
    </div>
</div>

<footer>
    © 2026 Digital School Project
</footer>

<script>
let students = [];

function addStudent(){
    let name = document.getElementById("name").value;
    let id = document.getElementById("id").value;
    let grade = document.getElementById("grade").value;

    students.push({name, id, grade: parseFloat(grade)});
    alert("Student Added Successfully!");
}

function showStudents(){
    let result = "";
    students.forEach(s => {
        result += "ID: " + s.id + " | Name: " + s.name + " | Grade: " + s.grade + "<br>";
    });
    document.getElementById("output").innerHTML = result;
}

function calculateAverage(){
    if(students.length === 0){
        document.getElementById("output").innerHTML = "No Data Available";
        return;
    }

    let sum = 0;
    students.forEach(s => sum += s.grade);

    document.getElementById("output").innerHTML =
        "Average Grade: " + (sum / students.length);
}
</script>

</body>
</html>
