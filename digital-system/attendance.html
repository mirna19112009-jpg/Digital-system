<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px;
    overflow-x:hidden;
    opacity:0;
}
nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}
nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    position:relative;
}
nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#00f2fe;
    transition:0.3s;
}
nav a:hover::after{width:100%;}

.form-container, .table-container{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    width:450px;
    margin-bottom:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.input-group{margin-bottom:15px;}
.input-group label{display:block;margin-bottom:5px;}
.input-group input, .input-group select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
    margin-bottom:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#00f2fe,#4facfe);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
button:hover{transform:scale(1.05);}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
table th, table td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.3);
}

.toast{
    position:fixed;
    bottom:30px;
    right:30px;
    background:#00c851;
    padding:15px 25px;
    border-radius:10px;
    display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    font-weight:500;
}
</style>
</head>
<body>

<nav>
    <a href="#" onclick="goTo('index.html')">Home</a>
    <a href="#" onclick="goTo('services.html')">Services</a>
</nav>

<h2>Attendance Tracking</h2>

<div class="form-container">
    <form id="attendanceForm">
        <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="studentName" required>
        </div>
        <div class="input-group">
            <label>Attendance</label>
            <select id="status">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
        </div>
        <button type="submit">Record Attendance</button>
    </form>
</div>

<div class="table-container">
    <table id="attendanceTable">
        <thead>
            <tr>
                <th>Student</th>
                <th>Status</th>
                <th>Total Absences</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="toast" id="toast">Attendance Recorded ✅</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// Fade In عند تحميل الصفحة
gsap.to("body",{opacity:1,duration:0.8});

// الانتقال بين الصفحات
function goTo(page){
    gsap.to("body",{opacity:0,duration:0.6,onComplete:function(){window.location.href=page;}});
}

// Animate دخول العناصر
gsap.from("nav",{y:-50,opacity:0,duration:1});
gsap.from("h2",{y:-50,opacity:0,duration:1,delay:0.3});
gsap.from(".form-container",{y:100,opacity:0,duration:1,delay:0.5});
gsap.from(".table-container",{y:100,opacity:0,duration:1,delay:0.7});

// Attendance Logic
let attendanceData={};

document.getElementById("attendanceForm").addEventListener("submit",function(e){
    e.preventDefault();
    let name=document.getElementById("studentName").value;
    let status=document.getElementById("status").value;

    if(!attendanceData[name]){attendanceData[name]=0;}
    if(status==="Absent"){attendanceData[name]+=1;}

    let tbody=document.querySelector("#attendanceTable tbody");
    let existingRow=Array.from(tbody.rows).find(row=>row.cells[0].innerText===name);

    if(existingRow){
        existingRow.cells[1].innerText=status;
        existingRow.cells[2].innerText=attendanceData[name];
    } else {
        let row=tbody.insertRow();
        row.insertCell(0).innerText=name;
        row.insertCell(1).innerText=status;
        row.insertCell(2).innerText=attendanceData[name];
    }

    // Toast Notification
    let toast=document.getElementById("toast");
    toast.style.display="block";
    gsap.fromTo("#toast",{x:200,opacity:0},{x:0,opacity:1,duration:0.6});
    setTimeout(()=>{toast.style.display="none";},3000);

    this.reset();
});
</script>

</body>
</html>
